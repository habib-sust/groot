<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groot — Markdown Viewer</title>
  </head>

  <body>
    <nav id="outline" hidden></nav>
    <main id="viewport"></main>
    <footer id="status-bar">
      <span id="sb-breadcrumb" class="sb-section"></span>
      <span class="sb-stats">
        <span id="sb-count"></span>
        <span id="sb-reading"></span>
        <span id="sb-save"></span>
      </span>
    </footer>
    <div id="error-banner" hidden>
      <span id="error-banner-msg"></span>
      <button id="error-banner-close" type="button" title="Dismiss">✕</button>
    </div>
    <div id="find-bar" hidden>
      <div class="find-row">
        <input id="find-input" type="text" placeholder="Find" autocomplete="off" spellcheck="false" />
        <span id="find-count"></span>
        <button id="find-prev" type="button" title="Previous (Shift+Enter)">↑</button>
        <button id="find-next" type="button" title="Next (Enter)">↓</button>
        <button id="find-close" type="button" title="Close (Esc)">✕</button>
      </div>
      <div class="find-row">
        <input id="replace-input" type="text" placeholder="Replace" autocomplete="off" spellcheck="false" />
        <button id="replace-one" type="button" title="Replace current match">Replace</button>
        <button id="replace-all" type="button" title="Replace all matches">All</button>
      </div>
    </div>
    <div id="unsaved-modal" hidden>
      <div class="modal-card">
        <p id="unsaved-msg">You have unsaved changes.</p>
        <div class="modal-buttons">
          <button id="unsaved-save" type="button">Save</button>
          <button id="unsaved-discard" type="button">Don't Save</button>
          <button id="unsaved-cancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
    <div id="command-palette" hidden>
      <div class="palette-card">
        <input id="palette-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
        <ul id="palette-list"></ul>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
