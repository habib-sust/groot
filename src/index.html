<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groot — Markdown Viewer</title>
  </head>

  <body>
    <nav id="outline" hidden></nav>
    <main id="viewport"></main>
    <div id="find-bar" hidden>
      <input id="find-input" type="text" placeholder="Find" autocomplete="off" spellcheck="false" />
      <span id="find-count"></span>
      <button id="find-prev" type="button" title="Previous (Shift+Enter)">↑</button>
      <button id="find-next" type="button" title="Next (Enter)">↓</button>
      <button id="find-close" type="button" title="Close (Esc)">✕</button>
    </div>
    <div id="unsaved-modal" hidden>
      <div class="modal-card">
        <p id="unsaved-msg">You have unsaved changes.</p>
        <div class="modal-buttons">
          <button id="unsaved-save" type="button">Save</button>
          <button id="unsaved-discard" type="button">Don't Save</button>
          <button id="unsaved-cancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
