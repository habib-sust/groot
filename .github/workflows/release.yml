name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches tauri.conf version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CONF_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match tauri.conf.json version $CONF_VERSION"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: npm ci

      # Decode the App Store Connect API key (.p8) used for notarization. Stored
      # as a base64 secret; written to a temp file whose path tauri reads via
      # APPLE_API_KEY_PATH. Guarded so unsigned builds still work without it.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT_BASE64: ${{ secrets.APPLE_API_KEY_CONTENT_BASE64 }}
        run: |
          if [ -n "$APPLE_API_KEY_CONTENT_BASE64" ]; then
            KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"
            echo "$APPLE_API_KEY_CONTENT_BASE64" | base64 --decode > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
            echo "App Store Connect API key written → signed + notarized build."
          else
            echo "No APPLE_API_KEY_CONTENT_BASE64 secret set → unsigned build."
          fi

      # --- Signing + notarization -------------------------------------------
      # tauri-action signs with the Developer ID Application cert (imported from
      # APPLE_CERTIFICATE) and notarizes via the App Store Connect API key, then
      # staples — automatically, when these secrets are present. If they are
      # empty, it falls back to an unsigned build (no other change needed).
      # Required repo secrets:
      #   APPLE_CERTIFICATE             base64 of the Developer ID .p12
      #   APPLE_CERTIFICATE_PASSWORD    the .p12 password
      #   APPLE_SIGNING_IDENTITY        "Developer ID Application: Name (TEAMID)"
      #   APPLE_API_KEY                 App Store Connect key ID
      #   APPLE_API_ISSUER             App Store Connect issuer UUID
      #   APPLE_API_KEY_CONTENT_BASE64  base64 of the .p8 key file
      # ----------------------------------------------------------------------
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "groot ${{ github.ref_name }}"
          releaseBody: "Download the .dmg below. groot is not yet notarized — see the README for the first-launch step."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

  bump-cask:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version, asset, arch and checksum
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSETS="$(gh release view "$GITHUB_REF_NAME" -R habib-sust/groot \
            --json assets -q '.assets[].name | select(endswith(".dmg"))')"
          ASSET="$(printf '%s\n' "$ASSETS" | head -n1)"
          if [ -z "$ASSET" ]; then
            echo "::error::no .dmg asset found on release $GITHUB_REF_NAME"
            exit 1
          fi
          ARCH="${ASSET#groot_${VERSION}_}"
          ARCH="${ARCH%.dmg}"
          gh release download "$GITHUB_REF_NAME" -R habib-sust/groot -p "$ASSET" -O /tmp/groot.dmg
          SHA="$(sha256sum /tmp/groot.dmg | cut -d' ' -f1)"
          {
            echo "version=$VERSION"
            echo "arch=$ARCH"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: habib-sust/homebrew-groot
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render cask into the tap
        run: |
          mkdir -p tap/Casks
          bash scripts/render-cask.sh \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.sha }}" \
            "${{ steps.meta.outputs.arch }}" > tap/Casks/groot.rb
          cat tap/Casks/groot.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/groot.rb
          if git diff --staged --quiet; then
            echo "cask already up to date"
          else
            git commit -m "groot ${{ steps.meta.outputs.version }}"
            git push
          fi
